# Deploy this with Dokploy "Compose" (NOT Dockerfile-only).
# Dockerfile-only skips devices/caps → no KVM, no NET_ADMIN, re-downloads every redeploy.

services:
  macos:
    image: dockurr/macos:1.14
    environment:
      VERSION: "15"
      DISK_SIZE: 256G
      RAM_SIZE: 8G
      CPU_CORES: "1"
    privileged: true
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    device_cgroup_rules:
      - "c *:* rwm"
    volumes:
      - macos-storage:/storage
    stop_grace_period: 2m
    networks:
      - dokploy-network
    deploy:
      labels:
        - traefik.enable=true
        - traefik.docker.network=dokploy-network
        - traefik.http.routers.osx-jobsvue-web.rule=Host(`osx.jobsvue.com`)
        - traefik.http.routers.osx-jobsvue-web.entrypoints=web
        - traefik.http.routers.osx-jobsvue-web.middlewares=redirect-to-https@file
        - traefik.http.routers.osx-jobsvue-web.service=osx-jobsvue
        - traefik.http.routers.osx-jobsvue-websecure.rule=Host(`osx.jobsvue.com`)
        - traefik.http.routers.osx-jobsvue-websecure.entrypoints=websecure
        - traefik.http.routers.osx-jobsvue-websecure.tls=true
        - traefik.http.routers.osx-jobsvue-websecure.tls.certresolver=letsencrypt
        - traefik.http.routers.osx-jobsvue-websecure.service=osx-jobsvue
        - traefik.http.services.osx-jobsvue.loadbalancer.server.port=8006

networks:
  dokploy-network:
    external: true

volumes:
  macos-storage:
